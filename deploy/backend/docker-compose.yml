services:
  recipe-backend:
    build: .
    image: wgxhl-recipe-backend:1.0.0
    container_name: wgxhl-recipe-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9001}:9001"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      APP_PORT: 9001
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_REGION: ${COS_REGION}
      COS_BUCKET: ${COS_BUCKET}
      COS_BASE_URL: ${COS_BASE_URL}
      PUSH_VAPID_PUBLIC_KEY: ${PUSH_VAPID_PUBLIC_KEY}
      PUSH_VAPID_PRIVATE_KEY: ${PUSH_VAPID_PRIVATE_KEY}
      PUSH_VAPID_SUBJECT: ${PUSH_VAPID_SUBJECT:-mailto:admin@wgxhl.space}
      PUSH_TTL_SECONDS: ${PUSH_TTL_SECONDS:-604800}
