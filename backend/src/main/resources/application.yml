spring:
  profiles:
    active: dev
  application:
    name: wgxhl-recipe
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${APP_PORT:9001}
  servlet:
    context-path: /recipe

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: input

auth:
  jwt:
    secret: ${JWT_SECRET:wgxhl-recipe-secret-key}
    expire-hours: ${JWT_EXPIRE_HOURS:168}
